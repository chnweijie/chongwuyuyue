<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Оплата услуг ветеринарной клиники «Здоровая лапка». Онлайн-оплата консультаций, процедур и лечения.">
    <title>Оплата — Здоровая лапка</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .payment-container {
            max-width: 560px;
            margin: 40px auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.08);
            padding: 32px;
        }
        .payment-container h2 {
            color: #1a3a5c;
            margin-bottom: 20px;
            text-align: center;
            font-size: 24px;
        }
        .back-link {
            display: block;
            margin-bottom: 20px;
            color: #2563eb;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover { text-decoration: underline; }

        /* Step indicator */
        .steps {
            display: flex;
            justify-content: center;
            gap: 0;
            margin-bottom: 32px;
            position: relative;
        }
        .steps::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 12%;
            right: 12%;
            height: 2px;
            background: #e5e7eb;
            z-index: 0;
        }
        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            position: relative;
            z-index: 1;
            flex: 1;
        }
        .step .circle {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #e5e7eb;
            color: #9ca3af;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.3s;
        }
        .step.active .circle { background: #2563eb; color: #fff; }
        .step.done .circle { background: #10b981; color: #fff; }
        .step .label { font-size: 12px; color: #9ca3af; text-align: center; }
        .step.active .label { color: #2563eb; font-weight: 600; }
        .step.done .label { color: #10b981; }

        /* Form elements */
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            color: #444;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 14px;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            box-sizing: border-box;
        }
        .form-group input:focus, .form-group textarea:focus {
            border-color: #2563eb;
            outline: none;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
        }
        .btn-primary {
            display: block;
            width: 100%;
            padding: 14px;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 17px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-primary:disabled { background: #94a3b8; cursor: not-allowed; }

        /* Order summary */
        .order-summary {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .order-summary .row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 14px;
        }
        .order-summary .row.total {
            border-top: 1px solid #e2e8f0;
            margin-top: 6px;
            padding-top: 10px;
            font-weight: 700;
            font-size: 18px;
            color: #1a3a5c;
        }

        /* Section visibility */
        .section { display: none; }
        .section.active { display: block; }


    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <span class="logo-icon">🐾</span>
                <span class="logo-text">Здоровая лапка</span>
            </div>
            <nav>
                <a href="index.html">Главная</a>
                <a href="services.html">Услуги</a>
                <a href="payment.html" class="active">Оплата</a>
                <a href="about.html">О клинике</a>
                <a href="contacts.html">Контакты</a>
            </nav>
        </div>
    </header>

    <div class="payment-container">

        <!-- ==================== Step Indicator (2 steps) ==================== -->
        <div class="steps">
            <div class="step active" id="step1">
                <span class="circle">1</span>
                <span class="label">Заказ</span>
            </div>
            <div class="step" id="step2">
                <span class="circle">2</span>
                <span class="label">Подтверждение</span>
            </div>
        </div>

        <!-- ==================== Section 1: Order Form ==================== -->
        <div class="section active" id="sec1">
            <h2>Создание заказа</h2>
            <div class="form-group">
                <label>Услуга</label>
                <textarea id="description" rows="2" placeholder="Например: Приём кардиолога, кошка Мурка"></textarea>
            </div>
            <div class="form-group">
                <label>Сумма (₽)</label>
                <input type="number" id="amount" min="1" step="1" placeholder="Введите сумму">
            </div>
            <button class="btn-primary" id="btnCreateOrder">Далее: подтверждение</button>
        </div>

        <!-- ==================== Section 2: Confirm & Pay ==================== -->
        <div class="section" id="sec2">
            <h2>Подтверждение платежа</h2>
            <p style="color:#6b7280;font-size:14px;margin-bottom:16px;text-align:center;">
                После нажатия кнопки вы будете перенаправлены на платёжную страницу ЮKassa.
            </p>
            <div class="order-summary" id="orderSummary"></div>
            <button class="btn-primary" id="btnPay" style="background:#10b981;">Оплатить через ЮKassa</button>
            <button style="display:block;width:100%;padding:12px;margin-top:10px;background:none;border:1px solid #d1d5db;border-radius:8px;color:#6b7280;cursor:pointer;font-size:14px;" id="btnBack1">← Назад</button>
        </div>
    </div>

    <footer>
        <div class="container">
            <p>&copy; 2026 Ветеринарная клиника «Здоровая лапка». Все права защищены.</p>
            <div class="social-links">
                <a href="https://vk.com/" target="_blank">VK</a>
                <a href="https://t.me/" target="_blank">Telegram</a>
            </div>
        </div>
    </footer>

    <script>
(function() {

    // ---- DOM refs ----
    var sections = {
        sec1: document.getElementById('sec1'),
        sec2: document.getElementById('sec2')
    };
    var steps = {
        step1: document.getElementById('step1'),
        step2: document.getElementById('step2')
    };

    var amountEl = document.getElementById('amount');
    var descEl = document.getElementById('description');
    var orderSummary = document.getElementById('orderSummary');

    var currentOrderId = null;
    var currentAmount = 0;
    var currentDesc = '';

    // ---- Helpers ----
    function showSection(name) {
        Object.keys(sections).forEach(function(k) { sections[k].classList.remove('active'); });
        sections[name].classList.add('active');
    }

    function setStep(index) {
        ['step1','step2'].forEach(function(k, i) {
            var el = steps[k];
            el.classList.remove('active', 'done');
            if (i + 1 < index) el.classList.add('done');
            if (i + 1 === index) el.classList.add('active');
        });
    }

    // ---- Init: read URL params ----
    var params = new URLSearchParams(window.location.search);
    var svcName = params.get('name');
    var svcPrice = params.get('price');
    if (svcName && svcPrice) {
        descEl.value = svcName;
        amountEl.value = svcPrice;
    }

    // ---- Step 1 → Step 2: Create order & show summary ----
    document.getElementById('btnCreateOrder').addEventListener('click', async function() {
        var amount = amountEl.value;
        var desc = descEl.value;

        if (!amount || amount <= 0) {
            alert('Пожалуйста, введите сумму.');
            return;
        }

        var btn = this;
        btn.disabled = true;
        btn.textContent = 'Создание заказа...';

        try {
            var resp = await fetch('/api/payment/create', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ amount: parseInt(amount), description: desc })
            });
            if (!resp.ok) { var t = await resp.text(); throw new Error(t); }
            var data = await resp.json();
            currentOrderId = data.id;
            currentAmount = parseInt(amount);
            currentDesc = desc;

            // Build order summary
            orderSummary.innerHTML = [
                '<div class="row"><span>Заказ</span><span style="word-break:break-all;max-width:280px;">' + currentOrderId + '</span></div>',
                '<div class="row"><span>Услуга</span><span>' + (currentDesc || '—') + '</span></div>',
                '<div class="row total"><span>Итого</span><span>' + currentAmount.toLocaleString('ru-RU') + ' ₽</span></div>'
            ].join('\n');

            showSection('sec2');
            setStep(2);
        } catch (err) {
            alert('Ошибка: ' + err.message);
        } finally {
            btn.disabled = false;
            btn.textContent = 'Далее: подтверждение';
        }
    });

    // ---- Step 2: Pay via YooKassa ----
    document.getElementById('btnPay').addEventListener('click', async function() {
        var btn = this;
        btn.disabled = true;
        btn.textContent = 'Создание платежа...';

        try {
            var resp = await fetch('/api/payment/yookassa/create', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    amount: currentAmount,
                    description: currentDesc || 'Оплата услуг ветеринарной клиники',
                    returnUrl: window.location.origin + '/payment-result.html'
                })
            });
            if (!resp.ok) { var t = await resp.text(); throw new Error(t); }
            var data = await resp.json();

            if (!data.confirmationUrl) {
                throw new Error('Не получен URL для оплаты');
            }

            // 保存本地订单ID，供结果页使用
            if (data.localOrderId) {
                localStorage.setItem('lastLocalOrderId', data.localOrderId);
            }

            window.location.href = data.confirmationUrl;

        } catch (err) {
            alert('Ошибка создания платежа: ' + err.message);
            btn.disabled = false;
            btn.textContent = 'Оплатить через ЮKassa';
        }
    });

    // ---- Back button ----
    document.getElementById('btnBack1').addEventListener('click', function() { showSection('sec1'); setStep(1); });

})();
    </script>
